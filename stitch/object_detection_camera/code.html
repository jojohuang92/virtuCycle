<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VirtuCycle Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#d9dad6",
              "inverse-surface": "#2e312e",
              "tertiary": "#00420c",
              "on-tertiary": "#ffffff",
              "outline": "#77786b",
              "primary": "#343c0a",
              "on-tertiary-container": "#82d37d",
              "inverse-primary": "#c3cc8c",
              "surface-container": "#edeee9",
              "on-background": "#1a1c19",
              "outline-variant": "#c8c7b8",
              "surface-container-high": "#e7e9e4",
              "primary-container": "#4b5320",
              "primary-fixed-dim": "#c3cc8c",
              "on-tertiary-fixed": "#002204",
              "primary-fixed": "#dfe8a6",
              "on-error-container": "#93000a",
              "surface-tint": "#5a632e",
              "on-surface": "#1a1c19",
              "surface-container-lowest": "#ffffff",
              "background": "#f9faf5",
              "tertiary-fixed": "#a3f69c",
              "on-secondary": "#ffffff",
              "secondary": "#5b6236",
              "secondary-fixed-dim": "#c4cb96",
              "on-secondary-container": "#5f663a",
              "surface-container-highest": "#e2e3de",
              "surface-container-low": "#f3f4ef",
              "error": "#ba1a1a",
              "on-primary-container": "#bdc787",
              "on-primary-fixed": "#191e00",
              "surface-bright": "#f9faf5",
              "tertiary-container": "#005c15",
              "surface": "#f9faf5",
              "secondary-fixed": "#e0e7b0",
              "inverse-on-surface": "#f0f1ec",
              "tertiary-fixed-dim": "#88d982",
              "on-primary": "#ffffff",
              "on-surface-variant": "#47483c",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "on-secondary-fixed": "#191e00",
              "on-secondary-fixed-variant": "#444a21",
              "on-tertiary-fixed-variant": "#005312",
              "on-primary-fixed-variant": "#434b18",
              "secondary-container": "#dde5ad",
              "surface-variant": "#e2e3de"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-frame {
            box-shadow: 0 0 0 100vmax rgba(26, 28, 25, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface overflow-hidden">
<!-- Top Navigation (Contextual Suppression: Hidden for Focused Task) -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 py-4 bg-transparent z-50">
<button class="w-12 h-12 flex items-center justify-center bg-surface/80 backdrop-blur-md rounded-full text-primary shadow-sm active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface/80 backdrop-blur-md rounded-full text-primary shadow-sm active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
</header>
<!-- Full Screen Camera Canvas -->
<main class="relative h-screen w-full bg-black">
<!-- Mock Camera Feed Background -->
<div class="absolute inset-0 z-0">
<img alt="Camera preview of a plastic bottle on a wooden surface" class="w-full h-full object-cover opacity-90" data-alt="Close up camera view of plastic bottle" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANGfbSgpU72NjNVb_Q2WYrf2suhpV9cZ9j9HnPOm5FoVvYCsFWLiWDuGbyb0WvYpyRBdxCoLtBjvUUFmjx_tG_dgzH9Aiw2_8CnoIGFV7dZebRxax4ezLat0wPhHwJaI5U48LXgVmsBTJE1t8p5UHPmnsfHeKa0XC6ZqxN90xe1Uz2sWegSOwSUal9B_niT1LG6fEOQPdOSOtuR6azgFi0fSx1iGcUExylrfbT7Is7Tn5sWvlEAaSwafHgDCHs2HqTWFRMRhe9XMs"/>
</div>
<!-- Scanning Overlay UI -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center">
<!-- Targeting Frame -->
<div class="relative w-72 h-72 md:w-96 md:h-96 scanner-frame border-2 border-primary-fixed-dim/50 rounded-xl">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Detection Badge (Floating Interaction) -->
<div class="absolute -top-16 left-1/2 -translate-x-1/2 bg-primary text-on-primary px-6 py-2 rounded-full flex items-center gap-2 shadow-2xl animate-pulse">
<span class="material-symbols-outlined text-[18px]" data-icon="auto_awesome">auto_awesome</span>
<span class="font-headline font-bold tracking-tight">Detecting...</span>
</div>
</div>
<!-- Real-time Result Card (Tonal Stacking & Organic Brutalism) -->
<div class="absolute bottom-40 w-[90%] max-w-md mx-auto">
<div class="bg-surface-container-lowest/90 backdrop-blur-xl p-6 rounded-xl shadow-2xl border border-outline-variant/20 flex items-center gap-6">
<div class="w-16 h-16 bg-secondary-container flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" data-icon="recycling">recycling</span>
</div>
<div class="flex-1">
<h2 class="font-headline font-extrabold text-2xl text-primary leading-tight">Plastic Bottle</h2>
<div class="flex items-center gap-2 mt-1">
<span class="w-3 h-3 rounded-full bg-yellow-400"></span>
<span class="text-on-surface-variant font-semibold text-sm uppercase tracking-widest">Yellow Bin</span>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold text-tertiary-container uppercase tracking-tighter bg-tertiary/10 px-2 py-1 rounded">Match 98%</span>
</div>
</div>
</div>
</div>
<!-- Controls Layer -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black/60 to-transparent z-20 flex justify-center items-center px-8">
<!-- Shutter Button (Impact CTA Style) -->
<button class="relative w-20 h-20 flex items-center justify-center rounded-full bg-white group active:scale-90 transition-transform duration-200">
<div class="absolute inset-0 rounded-full border-4 border-white/30 scale-125 group-hover:scale-110 transition-transform"></div>
<div class="w-16 h-16 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="photo_camera">photo_camera</span>
</div>
</button>
<!-- Gallery Shortcut -->
<button class="absolute right-10 w-12 h-12 rounded-lg bg-surface/20 border border-white/20 backdrop-blur-md overflow-hidden flex items-center justify-center">
<img alt="Last scanned item thumbnail" class="w-full h-full object-cover opacity-60" data-alt="Small thumbnail of recycling items" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATi6x4GCQFhOZvKr9RFyw6Zi0BmTSsEf6K6vejKcPX7tja6fXtl4w7qUB5BnieI6dQ3xHNj4IA5f96cvNBZ0RYAUdDQnJHCjZxhpoeGhPaJNL4yQy5vfpyxn-0zkznZOm8h7opwI5Ckses3eJGoTPsOBW1kda_U-wdTYbE4jUhif3YtDPf3EHlFL4nJpsPWpWzSUn3ZfWzuonY4hTHpttvrUDCLDH14c32h2oSqZRSAIO9QbP00KdHbSiTzYO4a3MmhqWgQ_Dsecg"/>
<span class="absolute material-symbols-outlined text-white text-sm" data-icon="image">image</span>
</button>
</div>
</main>
<!-- Bottom Navigation Shell (Re-using Shared Component Logic for Scanner Active State) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#f9faf5]/80 backdrop-blur-2xl shadow-[0_-20px_40px_rgba(52,60,10,0.05)] rounded-t-[3rem]">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-[#4B5320]/70 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="potted_plant">potted_plant</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[11px] tracking-wide uppercase mt-1">Dashboard</span>
</a>
<!-- Scanner (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-[#343c0a] text-[#f9faf5] rounded-full w-14 h-14 shadow-lg scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="center_focus_strong" style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
</a>
<!-- Stats -->
<a class="flex flex-col items-center justify-center text-[#4B5320]/70 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart_4_bars">bar_chart_4_bars</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[11px] tracking-wide uppercase mt-1">Stats</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-[#4B5320]/70 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[11px] tracking-wide uppercase mt-1">Settings</span>
</a>
</nav>
</body></html>
